name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compiler (linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../workspace-${{ matrix.target }}.tar.gz workspace
          cd ../../..
          shasum -a 256 workspace-${{ matrix.target }}.tar.gz > workspace-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-${{ matrix.target }}
          path: |
            workspace-${{ matrix.target }}.tar.gz
            workspace-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') || startsWith(steps.tag.outputs.tag, 'v0.') }}
          generate_release_notes: true
          files: release/*

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(needs.release.outputs.tag, '-') }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "${{ needs.release.outputs.version }}" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) does not match tag (${{ needs.release.outputs.version }})"
            exit 1
          fi

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUT=$(cargo publish --allow-dirty 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUT" | grep -q "429"; then
              echo "::warning::crates.io rate-limited (429). Skipping."
              exit 0
            fi
            exit $STATUS
          fi

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(needs.release.outputs.tag, '-') }}
    environment: production
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: WebchemistCorp/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Wait for release assets to settle
        run: sleep 15

      - name: Download SHA files via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -e
          mkdir -p sums

          RELEASE_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100")

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r --arg TAG "$TAG" \
            '.[] | select(.tag_name == $TAG) | .id' | head -n1)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::Could not find release for tag $TAG"
            exit 1
          fi
          echo "Found release id: $RELEASE_ID"

          ASSETS=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?per_page=100")

          for triple in x86_64-apple-darwin aarch64-apple-darwin \
                        x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            NAME="workspace-${triple}.tar.gz.sha256"
            ASSET_ID=$(echo "$ASSETS" | jq -r --arg N "$NAME" \
              '.[] | select(.name == $N) | .id')
            if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
              echo "::error::Asset not found: $NAME"
              exit 1
            fi
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/${ASSET_ID}" \
              -o "sums/${triple}.sha256"
          done

      - name: Render Formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="${{ needs.release.outputs.tag }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          SHA_MAC_X86=$(awk '{print $1}' sums/x86_64-apple-darwin.sha256)
          SHA_MAC_ARM=$(awk '{print $1}' sums/aarch64-apple-darwin.sha256)
          SHA_LIN_X86=$(awk '{print $1}' sums/x86_64-unknown-linux-gnu.sha256)
          SHA_LIN_ARM=$(awk '{print $1}' sums/aarch64-unknown-linux-gnu.sha256)

          mkdir -p tap/Formula
          cat > tap/Formula/workspace.rb <<EOF
          class Workspace < Formula
            desc "Business operations CLI for 개인/법인 사업자 — powered by Asurada"
            homepage "https://github.com/WebchemistCorp/workspace"
            version "${VERSION}"
            license "MIT"

            depends_on "webchemistcorp/tap/asurada"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/workspace-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              else
                url "${BASE}/workspace-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/workspace-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_ARM}"
              else
                url "${BASE}/workspace-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_X86}"
              end
            end

            def install
              bin.install "workspace"
            end

            def caveats
              <<~EOS
                Workspace binaries are not yet code-signed with an Apple
                Developer ID. On first launch macOS Gatekeeper may show
                an "unidentified developer" warning. To allow it:

                  xattr -d com.apple.quarantine "$(which workspace)"

                Quick start:
                  workspace config set database-url "postgresql://..."
                  workspace setup
              EOS
            end

            test do
              assert_match "workspace", shell_output("#{bin}/workspace --version")
            end
          end
          EOF

      - name: Commit & push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/workspace.rb
          git commit -m "workspace ${{ needs.release.outputs.version }}" || exit 0
          git push
